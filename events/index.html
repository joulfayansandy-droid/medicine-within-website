<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Medicine Within Events - Temple nights, Kambo ceremonies, and Tantra immersions in Amsterdam.">
    
    <title>Upcoming Events | Medicine Within</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/img/logo-gold.svg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
    <!-- ========== HEADER ========== -->
    <div data-component="navigation"></div>
    
    <!-- ========== HERO ========== -->
    <div 
        data-component="hero-v2"
        data-hero-label="Join the Tribe"
        data-hero-title="EVENTS"
        data-hero-subtitle="Women's circles, sacred ceremonies, and embodied connection."
        data-hero-image-src="/assets/img/events/Maithuna-day01-byShariVandeCraen-3.jpg"
        data-hero-place="mw-hero--place-top-right"
        data-hero-overlay="mw-hero--overlay-top"
        data-hero-mobile="mw-hero--mobile-top"
        data-hero-cta-text="View Calendar"
        data-hero-cta-link="#events"
    ></div>
    
    <!-- ========== EVENTS IFRAME ========== -->
    <section class="section section-dark">
        <div class="container">
            <div class="section-header">
                <div class="ornament"><span>◊</span></div>
                <h2>View All Events & Book Tickets</h2>
                <p class="text-muted">Browse our full calendar of ceremonies, Temple Nights, and workshops. Secure your spot directly through Hipsy.</p>
            </div>
            
            <div class="events-container">
                <iframe 
                    src="https://hipsy.nl/medicine-within" 
                    class="hipsy-iframe"
                    title="Medicine Within Events on Hipsy"
                    loading="lazy"
                    allowtransparency="true"
                    scrolling="yes">
                </iframe>
            </div>
        </div>
    </section>

    <!-- ========== IMAGE GALLERY ========== -->
    <div 
        data-component="image-grid"
        data-title="Captured Moments"
        data-tagline="The Essence of Our Gatherings"
        data-grid-class="gallery-2"
        data-images='<div class="gallery-item"><img src="../assets/img/events/Maithuna-day01-byShariVandeCraen-10.jpg" alt="Medicine detail"></div><div class="gallery-item"><img src="../assets/img/events/Maithuna-day01-byShariVandeCraen-25.jpg" alt="Sacred Ritual"></div><div class="gallery-item"><img src="../assets/img/events/Maithuna-day02-byShariVandeCraen-150.jpg" alt="Soft light"></div><div class="gallery-item"><img src="../assets/img/events/Maithuna-day02-byShariVandeCraen-1.jpg" alt="Temple gathering"></div>'
        data-section-class="section-elevated"
    ></div>

    <!-- ========== FOOTER ========== -->
    <div data-component="footer"></div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
