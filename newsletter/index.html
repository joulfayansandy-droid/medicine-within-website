<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join the Temple Letter - Teachings, Rituals & Early Access from Medicine Within.">
    
    <title>Newsletter | Medicine Within</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../assets/img/logo-gold.svg">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    
    <!-- ========== HEADER ========== -->
    <div data-component="navigation"></div>
    
    <!-- ========== HERO ========== -->
    <div 
        data-component="hero-v2"
        data-hero-label="The Temple Letter"
        data-hero-title="STAY<span>CONNECTED</span>"
        data-hero-subtitle="Teachings, rituals, and early access. Reconnect to your body through community."
        data-hero-image-src="/assets/img/events/Maithuna-day02-byShariVandeCraen-150.jpg"
        data-hero-place="mw-hero--place-bottom-left"
        data-hero-overlay="mw-hero--overlay-bottom"
        data-hero-cta-text="Join the Tribe"
        data-hero-cta-link="#newsletter"
    ></div>
    
    <!-- ========== NEWSLETTER SECTION ========== -->
    <section id="newsletter" class="section mood-deep-anchor">
        <div class="container container-narrow text-center">
            <div class="ornament"><span>◊</span></div>
            <h2>Join the <span class="gold-texture-text">Community</span></h2>
            <p class="lead">Step into the temple of your becoming. Reconnect to your body through Medicine, Tantra, and Community.</p>
            
            <!-- Media Moment for Newsletter -->
            <div class="content-block__media content-block__media--fixed mt-xl mb-xl container-narrow mx-auto">
                <img src="../assets/img/hero/GoddessSandi-byShariVandeCraen-9.jpg" alt="Medicine Within Altar" style="object-position: center 30%;">
            </div>

            <div class="mt-xl">
                <!-- This will be handled by the footer newsletter component, but we can also have a standalone form here if needed -->
                <form class="newsletter-form" data-ck-tags="4488028">
                    <div class="newsletter-form-group">
                        <input type="email" name="email" class="form-input" placeholder="Your email address" required>
                        <button type="submit" class="btn btn-primary">Join the Community</button>
                    </div>
                </form>
                <p class="newsletter-privacy mt-md">No spam, ever. Unsubscribe anytime.</p>
            </div>
        </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <div data-component="footer"></div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
