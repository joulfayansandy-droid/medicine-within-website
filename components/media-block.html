<section class="section {{sectionClass}}">
    <div class="container">
        <div class="content-block {{blockClass}}">
            <div class="content-block__text">
                {{#tagline}}<p class="tagline">{{tagline}}</p>{{/tagline}}
                {{#title}}<h3>{{title}}</h3>{{/title}}
                <div class="content-text">
                    {{content}}
                </div>
                {{#ctaText}}
                <div class="content-block__cta">
                    <a href="{{ctaLink}}" class="btn">{{ctaText}}</a>
                </div>
                {{/ctaText}}
            </div>
            <div class="content-block__media">
                {{#galleryImages}}
                <div class="image-gallery image-gallery--4">
                    {{galleryImages}}
                </div>
                {{/galleryImages}}
                {{^galleryImages}}
                <img src="{{imageSrc}}" alt="{{imageAlt}}" loading="lazy">
                {{/galleryImages}}
            </div>
        </div>
    </div>
</section>
