<section id="{{id}}" class="mw-hero {{placeClass}} {{overlayClass}} {{mobileClass}}">
    <div class="mw-hero__media {{mediaClass}}">
        <img src="{{imageSrc}}" alt="{{imageAlt}}">
    </div>
    <div class="mw-hero__overlay"></div>
    <div class="mw-hero__content">
        <div class="mw-hero__top">
            {{#label}}<span class="mw-hero__label">{{label}}</span>{{/label}}
            <h1 class="mw-hero__title">{{title}}</h1>
        </div>
        <div class="mw-hero__bottom">
            <p class="mw-hero__subtitle">{{subtitle}}</p>
            <div class="mw-hero__cta">
                <a href="{{ctaLink}}" class="btn">{{ctaText}}</a>
            </div>
        </div>
    </div>
</section>
