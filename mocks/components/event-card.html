<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Within | Event Card Mock</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mw-teal: #2F4347;
            --mw-gold: #D4AF37;
            --mw-charcoal: #1A1A1F;
            --mw-bone: #E8E1D8;
            
            --mw-font-headlines: 'Cinzel', serif;
            --mw-font-body: 'Cormorant Garamond', serif;
            --mw-font-support: 'Inter', sans-serif;
        }

        body {
            background-color: var(--mw-charcoal);
            color: var(--mw-bone);
            font-family: var(--mw-font-body);
            margin: 0;
            padding: 4rem 2rem;
        }

        .doc-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .doc-header {
            margin-bottom: 4rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 2rem;
        }

        .doc-header h1 {
            font-family: var(--mw-font-headlines);
            color: var(--mw-gold);
            margin: 0;
        }

        /* 
           ==========================================================================
           EVENT CARD COMPONENT
           ========================================================================== 
        */

        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
        }

        @media (max-width: 640px) {
            .event-grid {
                grid-template-columns: 1fr;
            }
        }

        .event-card {
            display: flex;
            background: rgba(26, 31, 32, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.1);
            overflow: hidden;
            text-decoration: none;
            color: var(--mw-bone);
            transition: all 0.4s ease;
        }

        .event-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-5px);
            background: rgba(26, 31, 32, 0.6);
        }

        .event-card__image {
            width: 40%;
            position: relative;
            overflow: hidden;
        }

        .event-card__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.2) contrast(1.1) brightness(0.8);
            transition: transform 0.8s ease;
        }

        .event-card:hover .event-card__image img {
            transform: scale(1.1);
            filter: sepia(0) contrast(1.2) brightness(0.9);
        }

        .event-card__content {
            width: 60%;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .event-card__date-pill {
            display: inline-block;
            font-family: var(--mw-font-support);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--mw-gold);
            margin-bottom: 1rem;
        }

        .event-card__title {
            font-family: var(--mw-font-headlines);
            font-size: 1.25rem;
            margin: 0 0 1rem 0;
            line-height: 1.2;
            letter-spacing: 0.05em;
        }

        .event-card__meta {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .event-card__meta-item {
            font-family: var(--mw-font-support);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .event-card__meta-item::before {
            content: '•';
            color: var(--mw-gold);
        }

        .event-card__price {
            margin-top: 1.5rem;
            font-family: var(--mw-font-headlines);
            font-size: 1rem;
            color: var(--mw-gold);
        }

        @media (max-width: 480px) {
            .event-card {
                flex-direction: column;
            }
            .event-card__image, .event-card__content {
                width: 100%;
            }
            .event-card__image {
                aspect-ratio: 16/9;
            }
        }

        /* Documentation Helpers */
        .example-section { margin-top: 4rem; }
        .example-label { 
            display: inline-block;
            background: var(--mw-gold);
            color: var(--mw-charcoal);
            padding: 0.25rem 0.75rem;
            font-family: var(--mw-font-support);
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="doc-container">
        <header class="doc-header">
            <h1>Event Card</h1>
            <p>Summary cards for upcoming group offerings, ceremonies, and temples.</p>
        </header>

        <div class="example-section">
            <span class="example-label">Grid Layout</span>
            
            <div class="event-grid">
                <!-- Example 1 -->
                <a href="#" class="event-card">
                    <div class="event-card__image">
                        <img src="https://benji-cpu.github.io/medicine-within-website/assets/img/events/Maithuna-day01-byShariVandeCraen-1.jpg" alt="">
                    </div>
                    <div class="event-card__content">
                        <span class="event-card__date-pill">Sunday, Jan 12</span>
                        <h3 class="event-card__title">Sunday Tantrik Temple Day</h3>
                        <div class="event-card__meta">
                            <span class="event-card__meta-item">Amsterdam</span>
                            <span class="event-card__meta-item">11:00 - 18:00</span>
                        </div>
                        <div class="event-card__price">€95</div>
                    </div>
                </a>

                <!-- Example 2 -->
                <a href="#" class="event-card">
                    <div class="event-card__image">
                        <img src="https://benji-cpu.github.io/medicine-within-website/assets/img/methodology/purge.jpg" alt="">
                    </div>
                    <div class="event-card__content">
                        <span class="event-card__date-pill">Friday, Feb 07</span>
                        <h3 class="event-card__title">Kambô Ceremony Circle</h3>
                        <div class="event-card__meta">
                            <span class="event-card__meta-item">Online / In-Person</span>
                            <span class="event-card__meta-item">Intimate Circle</span>
                        </div>
                        <div class="event-card__price">€120</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
