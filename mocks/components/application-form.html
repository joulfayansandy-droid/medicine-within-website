<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Within | Application Form Mock</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mw-teal: #2F4347;
            --mw-gold: #D4AF37;
            --mw-charcoal: #1A1A1F;
            --mw-bone: #E8E1D8;
            
            --mw-font-headlines: 'Cinzel', serif;
            --mw-font-body: 'Cormorant Garamond', serif;
            --mw-font-support: 'Inter', sans-serif;
        }

        body {
            background-color: var(--mw-charcoal);
            color: var(--mw-bone);
            font-family: var(--mw-font-body);
            margin: 0;
            padding: 4rem 2rem;
        }

        .doc-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .doc-header {
            margin-bottom: 4rem;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 2rem;
        }

        .doc-header h1 {
            font-family: var(--mw-font-headlines);
            color: var(--mw-gold);
            margin: 0;
        }

        /* 
           ==========================================================================
           APPLICATION FORM COMPONENT
           ========================================================================== 
        */

        .application-form-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(26, 31, 32, 0.4);
            border: 1px solid rgba(212, 175, 55, 0.15);
            padding: 3rem 4rem;
        }

        @media (max-width: 640px) {
            .application-form-container {
                padding: 2rem;
            }
        }

        .form-section {
            margin-bottom: 3rem;
        }

        .form-section-title {
            font-family: var(--mw-font-headlines);
            font-size: 1.25rem;
            color: var(--mw-gold);
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .form-section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: rgba(212, 175, 55, 0.2);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-label {
            display: block;
            font-family: var(--mw-font-body);
            font-size: 1.2rem;
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .form-label span {
            font-family: var(--mw-font-support);
            font-size: 0.8rem;
            opacity: 0.6;
            display: block;
            margin-top: 0.25rem;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 1rem;
            color: var(--mw-bone);
            font-family: var(--mw-font-body);
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--mw-gold);
            background: rgba(0, 0, 0, 0.5);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .form-checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            font-family: var(--mw-font-support);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .form-checkbox:hover {
            opacity: 1;
        }

        .form-checkbox input {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid var(--mw-gold);
            cursor: pointer;
            position: relative;
        }

        .form-checkbox input:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--mw-gold);
            font-size: 12px;
        }

        .form-submit-container {
            text-align: center;
            margin-top: 4rem;
        }

        .form-submit {
            background: transparent;
            color: var(--mw-gold);
            border: 1px solid var(--mw-gold);
            padding: 1.2rem 4rem;
            font-family: var(--mw-font-headlines);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .form-submit:hover {
            background: var(--mw-gold);
            color: var(--mw-charcoal);
        }

        .form-note {
            margin-top: 2rem;
            font-size: 0.95rem;
            font-style: italic;
            text-align: center;
            opacity: 0.7;
        }

        /* Documentation Helpers */
        .example-section { margin-top: 4rem; }
        .example-label { 
            display: inline-block;
            background: var(--mw-gold);
            color: var(--mw-charcoal);
            padding: 0.25rem 0.75rem;
            font-family: var(--mw-font-support);
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="doc-container">
        <header class="doc-header">
            <h1>Application Form</h1>
            <p>A comprehensive intake form for private work and deep immersions.</p>
        </header>

        <div class="example-section">
            <span class="example-label">Live Form Mock</span>
            
            <div class="application-form-container">
                <form action="#" method="POST">
                    
                    <!-- Section: Intention -->
                    <div class="form-section">
                        <h3 class="form-section-title">Intention & Inquiry</h3>
                        
                        <div class="form-group">
                            <label class="form-label">What’s calling you into private work right now? <span>(A few honest lines is enough.)</span></label>
                            <textarea class="form-control" name="calling"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">What feels most alive for you at this moment?</label>
                            <div class="form-checkbox-group">
                                <label class="form-checkbox">
                                    <input type="checkbox" name="alive" value="ritual"> Ritual depth
                                </label>
                                <label class="form-checkbox">
                                    <input type="checkbox" name="alive" value="integration"> Integration support
                                </label>
                                <label class="form-checkbox">
                                    <input type="checkbox" name="alive" value="embodiment"> Ongoing embodiment
                                </label>
                                <label class="form-checkbox">
                                    <input type="checkbox" name="alive" value="unsure"> I’m not sure yet
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Section: Depth -->
                    <div class="form-section">
                        <h3 class="form-section-title">The Inner Landscape</h3>
                        
                        <div class="form-group">
                            <label class="form-label">What are you currently navigating? <span>(e.g. intimacy, sexuality, identity, grief, transitions, purpose.)</span></label>
                            <textarea class="form-control" name="navigating"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="form-label">On the other side of this work — how do you want to feel, live, or love differently?</label>
                            <textarea class="form-control" name="future"></textarea>
                        </div>
                    </div>

                    <!-- Section: Safety -->
                    <div class="form-section">
                        <h3 class="form-section-title">Safety & Holding</h3>
                        
                        <div class="form-group">
                            <label class="form-label">Are there any medications or mental health considerations I should be aware of? <span>(This helps me hold the space safely.)</span></label>
                            <textarea class="form-control" name="safety"></textarea>
                        </div>
                    </div>

                    <div class="form-submit-container">
                        <button type="submit" class="form-submit">Send Inquiry</button>
                        <p class="form-note">Within 3 days, I’ll respond with clarity on fit and the next step.</p>
                    </div>

                </form>
            </div>
        </div>
    </div>

</body>
</html>
